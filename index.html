<script type="text/babel">


const { useState, useEffect, useRef, useCallback } = React;

const IMGS = {
  exterior: 'uploads/rimage (13)-d4847041.jpeg', // corner exterior – best hero
  street: 'uploads/rimage (18)-9e79f620.jpeg', // balcony view, neighbourhood
  rooftop: 'uploads/rimage (17)-1968ab1f.jpeg', // rooftop terrace
  entrance: 'uploads/rimage (16)-424acf98.jpeg', // entrance door facade
  lobby: 'uploads/rimage (15)-bc1d1725.jpeg', // marble lobby
  street2: 'uploads/rimage (14)-3e8e15ae.jpeg' // street view
};

function useFadeIn(threshold = 0.1) {
  const ref = useRef(null), [v, setV] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); obs.disconnect(); } }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, v];
}
function useParallax(speed = 0.12) {
  const ref = useRef(null);
  useEffect(() => {
    if (window.innerWidth <= 768) return;
    const el = ref.current; if (!el) return;
    const tick = () => {
      const rect = el.parentElement.getBoundingClientRect();
      const cy = rect.top + rect.height / 2 - window.innerHeight / 2;
      el.style.transform = `translateY(${cy * speed}px) scale(1.08)`;
    };
    window.addEventListener('scroll', tick, { passive: true }); tick();
    return () => window.removeEventListener('scroll', tick);
  }, [speed]);
  return ref;
}
function FadeIn({ children, delay = 0, style = {}, className = '', from = 'bottom' }) {
  const [ref, v] = useFadeIn();
  const hidden = from === 'left' ? 'translateX(-28px)' : from === 'right' ? 'translateX(28px)' : 'translateY(28px)';
  return <div ref={ref} className={className} style={{
    opacity: v ? 1 : 0,
    transform: v ? 'translate(0,0)' : hidden,
    transition: `opacity .85s cubic-bezier(0.22,1,0.36,1) ${delay}ms, transform .85s cubic-bezier(0.22,1,0.36,1) ${delay}ms`,
    ...style
  }}>{children}</div>;
}

function useCounter(target, active, duration = 1800) {
  const [val, setVal] = useState(0);
  const rafRef = useRef(null);
  useEffect(() => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (!active) { setVal(0); return; }
    const isNum = /^\d+$/.test(String(target));
    if (!isNum) { setVal(target); return; }
    const n = parseInt(target, 10);
    const start = performance.now();
    const tick = (now) => {
      const p = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 4);
      setVal(Math.round(ease * n));
      if (p < 1) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [active, target, duration]);
  return val;
}

function useScramble(children, hovered) {
  const [scrambled, setScrambled] = useState(null);
  const rafRef = useRef(null);
  const str = String(children);
  useEffect(() => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (!hovered || !/\d/.test(str)) { setScrambled(null); return; }
    const t0 = performance.now();
    const dur = 480;
    const step = (now) => {
      const p = Math.min((now - t0) / dur, 1);
      if (p >= 1) { setScrambled(null); return; }
      const result = str.split('').map((ch, i) => {
        if (!/\d/.test(ch)) return ch;
        const cp = Math.max(0, p * 1.9 - i * 0.09);
        return cp > 1 ? ch : String(Math.floor(Math.random() * 10));
      }).join('');
      setScrambled(result);
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [hovered, str]);
  return scrambled !== null ? scrambled : children;
}

function Scramble({ children, style = {} }) {
  const [hovered, setHovered] = useState(false);
  const display = useScramble(children, hovered);
  return (
    <span onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{ cursor: 'default', userSelect: 'none', ...style }}>{display}</span>);
}

function CountUp({ value, duration = 1800, suffix = '' }) {
  const ref = useRef(null);
  const [active, setActive] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.intersectionRatio >= 0.6) setActive(true);
      else if (e.intersectionRatio === 0) setActive(false);
    }, { threshold: [0, 0.6] });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  const counted = useCounter(String(value), active, duration);
  const isNum = /^\d+$/.test(String(value));
  return <span ref={ref}><Scramble>{isNum ? counted : value}</Scramble>{suffix}</span>;
}

// ── Navigation ──────────────────────────────────────────────────────────
function Nav({ active }) {
  const [open, setOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', fn);return () => window.removeEventListener('scroll', fn);
  }, []);
  const links = [
  { id: 'om', label: 'Om föreningen' },
  { id: 'boende', label: 'Boendeinformation' },
  { id: 'galleri', label: 'Fastigheten' },
  { id: 'dokument', label: 'Dokument' },
  { id: 'kontakt', label: 'Kontakt' }];

  const base = { position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100, padding: '0 clamp(20px,4vw,48px)',

    backdropFilter: scrolled ? 'blur(14px)' : 'none',
    borderBottom: scrolled ? '1px solid var(--border)' : '1px solid transparent',
    transition: 'all .35s ease', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 70 };
  const onHero = !scrolled;
  const lnk = (id) => ({ fontFamily: 'var(--sans)', fontSize: 12, fontWeight: 400, letterSpacing: '.08em', textTransform: 'uppercase',
    color: active === id ? (onHero ? '#fff' : 'var(--accent)') : (onHero ? 'rgba(255,255,255,0.82)' : 'var(--ink-soft)'), textDecoration: 'none',
    borderBottom: active === id ? `1px solid ${onHero ? '#fff' : 'var(--accent)'}` : '1px solid transparent', paddingBottom: 2, transition: 'color .35s,border-color .35s' });
  const barColor = onHero ? '#fff' : 'var(--ink)';
  return (
    <nav style={base} role="navigation" aria-label="Huvudnavigation">
      <a href="#hero" style={{ fontFamily: 'var(--serif)', fontSize: 22, fontWeight: 400, color: onHero ? '#fff' : 'var(--ink)', textDecoration: 'none', lineHeight: 1.1, display: 'flex', flexDirection: 'column', gap: "10px", transition: 'color .35s' }}>
        <span style={{ fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: onHero ? 'rgba(255,255,255,0.55)' : 'var(--ink-muted)', fontFamily: 'var(--sans)', fontWeight: 400, transition: 'color .35s' }}>BRF</span>
        Reveljen 4
      </a>
      <div className="desktop-nav" style={{ display: 'flex', gap: 32, alignItems: 'center' }}>
        {links.map((l) => <a key={l.id} href={`#${l.id}`} style={lnk(l.id)}>{l.label}</a>)}
      </div>
      <button onClick={() => setOpen((o) => !o)} className="hamburger" aria-label={open ? 'Stäng' : 'Öppna meny'}
      style={{ display: 'none', flexDirection: 'column', background: 'none', border: 'none', cursor: 'pointer', padding: 8, gap: 5 }}>
        <div style={{ width: 24, height: 1.5, background: barColor, transition: 'transform .2s, background .35s', transform: open ? 'rotate(45deg) translate(4.5px,4.5px)' : 'none' }} />
        <div style={{ width: 24, height: 1.5, background: barColor, opacity: open ? 0 : 1, transition: 'opacity .2s, background .35s' }} />
        <div style={{ width: 24, height: 1.5, background: barColor, transition: 'transform .2s, background .35s', transform: open ? 'rotate(-45deg) translate(4.5px,-4.5px)' : 'none' }} />
      </button>
      {open &&
      <div style={{ position: 'fixed', top: 70, left: 0, right: 0, background: 'rgba(248,246,242,.98)', backdropFilter: 'blur(14px)', padding: '28px clamp(20px,4vw,48px) 36px', borderBottom: '1px solid var(--border)', display: 'flex', flexDirection: 'column', gap: 22 }}>
          {links.map((l) => <a key={l.id} href={`#${l.id}`} onClick={() => setOpen(false)} style={{ ...lnk(l.id), fontSize: 15 }}>{l.label}</a>)}
        </div>
      }
    </nav>);

}

// ── Hero ─────────────────────────────────────────────────────────────────
function Hero() {
  const [scrollY, setScrollY] = useState(0);
  useEffect(() => {
    if (window.innerWidth <= 768) return;
    const fn = () => setScrollY(window.scrollY);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <section id="hero" data-screen-label="Startsida – Hero"
    style={{ position: 'relative', minHeight: '100vh', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', overflow: 'hidden' }}>
      {/* Real photo background */}
      <div style={{ position: 'absolute', inset: 0 }}>
        <img src={IMGS.exterior} alt="BRF Reveljen 4 fasad" fetchpriority="high" style={{ width: '100%', height: '115%', objectFit: 'cover', objectPosition: 'center 30%', transform: `translateY(${scrollY * 0.28}px)`, willChange: 'transform' }} />
        <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(10,22,40,.85) 0%, rgba(10,22,40,.35) 55%, rgba(10,22,40,.1) 100%)' }} />
      </div>

      <div style={{ position: 'relative', padding: '0 clamp(20px,4vw,56px) 88px', maxWidth: 1180, margin: '0 auto', width: '100%', animation: 'fadeUp 1.1s cubic-bezier(0.22,1,0.36,1) both', animationDelay: '200ms' }}>
        <div style={{ display: 'inline-block', background: 'rgba(255,255,255,.12)', backdropFilter: 'blur(8px)', border: '1px solid rgba(255,255,255,.2)', borderRadius: 3, padding: '5px 14px', marginBottom: 28 }}>
          <span style={{ color: 'rgba(255,255,255,.85)', fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', fontFamily: 'var(--sans)' }}>STOCKHOLM · GÄRDET</span>
        </div>
        <h1 className="hero-title" style={{ fontFamily: 'var(--serif)', fontSize: 'clamp(52px,8vw,100px)', fontWeight: 300, color: '#fff', lineHeight: 1.02, letterSpacing: '-.01em', marginBottom: 24 }}>
          BRF<br /><em>Reveljen 4</em>
        </h1>
        <p style={{ color: 'rgba(255,255,255,.8)', fontSize: 18, maxWidth: 460, lineHeight: 1.75, marginBottom: 52, fontWeight: 300 }}>
          En välskött bostadsrättsförening på Nedre Gärdet i Stockholm, med fastighet uppförd 1935.
        </p>
        <div className="hero-btns" style={{ display: 'flex', gap: 14, flexWrap: 'wrap' }}>
          {[
          { href: '#dokument', label: 'Dokument', primary: true },
          { href: '#galleri', label: 'Se fastigheten', primary: false },
          { href: '#kontakt', label: 'Kontakt', primary: false }].
          map((b) =>
          <a key={b.label} href={b.href} style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '14px 26px', borderRadius: 3,

            color: b.primary ? 'var(--accent)' : '#fff', border: b.primary ? 'none' : '1px solid rgba(255,255,255,.3)',
            backdropFilter: 'blur(8px)' }}>
              {b.label}

            </a>
          )}
        </div>
      </div>

    </section>);

}

// ── Stats bar ─────────────────────────────────────────────────────────────
function StatItem({ v, l, delay, last }) {
  const ref = useRef(null);
  const [active, setActive] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.intersectionRatio >= 0.6) setActive(true);
      else if (e.intersectionRatio === 0) setActive(false);
    }, { threshold: [0, 0.6] });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  const counted = useCounter(v, active);
  const isNum = /^\d+$/.test(v);
  return (
    <FadeIn delay={delay}>
      <div ref={ref} style={{ textAlign: 'center', padding: '4px 16px', borderRight: !last ? '1px solid rgba(255,255,255,.18)' : 'none', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-end' }}>
        <div style={{ fontFamily: 'var(--serif)', fontSize: isNum ? 38 : 20, fontWeight: 300, color: '#fff', lineHeight: 1.2, minHeight: 46, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'opacity .3s' }}>
          {isNum ? counted : v}
        </div>
        <div style={{ color: 'rgba(255,255,255,.6)', fontSize: 11, letterSpacing: '.14em', textTransform: 'uppercase', marginTop: 8, fontFamily: 'var(--sans)' }}>{l}</div>
      </div>
    </FadeIn>
  );
}

function Stats() {
  const items = [
  { v: '1935', l: 'Byggår' },
  { v: '24', l: 'Lägenheter' },
  { v: 'Erik Dahlbergsgatan 28', l: 'Adress' },
  { v: 'Gärdet', l: 'Stadsdel' }];

  return (
    <section style={{ background: 'var(--accent)', padding: '44px clamp(20px,4vw,48px)' }}>
      <div className="stats-grid" style={{ maxWidth: 1100, margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 0 }}>
        {items.map((s, i) => <StatItem key={s.l} v={s.v} l={s.l} delay={i * 100} last={i === items.length - 1} />)}
      </div>
    </section>);

}

// ── Section helper ────────────────────────────────────────────────────────
function Sec({ id, label, bg, children, pad = '100px clamp(20px,4vw,48px)' }) {
  return (
    <section id={id} data-screen-label={label} style={{ background: bg || 'var(--bg)', padding: pad }}>
      <div style={{ maxWidth: 1100, margin: '0 auto' }}>{children}</div>
    </section>);

}
function SecHead({ eyebrow, title, sub }) {
  const [ref, v] = useFadeIn();
  return (
    <div ref={ref} style={{ marginBottom: 60, opacity: v ? 1 : 0, transform: v ? 'translateY(0)' : 'translateY(24px)', transition: 'opacity .85s cubic-bezier(0.22,1,0.36,1), transform .85s cubic-bezier(0.22,1,0.36,1)' }}>
      {eyebrow && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
          <div style={{ height: 1, background: 'var(--accent)', width: v ? 32 : 0, transition: 'width .9s cubic-bezier(0.22,1,0.36,1) 200ms' }} />
          <p style={{ color: 'var(--accent)', fontSize: 10, letterSpacing: '.22em', textTransform: 'uppercase', fontFamily: 'var(--sans)', fontWeight: 500 }}>{eyebrow}</p>
        </div>
      )}
      <h2 style={{ fontFamily: 'var(--serif)', fontSize: 'clamp(34px,5vw,58px)', fontWeight: 300, color: 'var(--ink)', lineHeight: 1.08, letterSpacing: '-.01em', marginBottom: sub ? 18 : 0, maxWidth: 620, textWrap: 'balance', transition: 'opacity .85s cubic-bezier(0.22,1,0.36,1), transform .85s cubic-bezier(0.22,1,0.36,1)' }}>{title}</h2>
      {sub && <p style={{ color: 'var(--ink-soft)', fontSize: 17, lineHeight: 1.75, maxWidth: 560, fontWeight: 300 }}>{sub}</p>}
    </div>);

}

// ── Om föreningen ──────────────────────────────────────────────────────────
function Om() {

  return (
    <Sec id="om" label="Om föreningen">
      <SecHead eyebrow="Om oss" title="BRF Reveljen 4" sub="En liten bostadsrättsförening med 24 lägenheter i ett femvåningshus på Erik Dahlbergsgatan 28 i Gärdet. Fastigheten uppfördes 1935 och föreningen registrerades 1996. Styrelsen är aktiv och engagerad, och föreningen har god ekonomi med låg belåning." />
      <div className="two-col" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'start' }}>
        <FadeIn>
          <div>
            <div style={{ width: '100%', aspectRatio: '3/4', overflow: 'hidden', borderRadius: 6, marginBottom: 28 }}>
              <img ref={paraRef} src={IMGS.exterior} alt="BRF Reveljen 4 fasad" loading="lazy" style={{ width: '100%', height: '108%', objectFit: 'cover', objectPosition: 'center', willChange: 'transform' }} />
            </div>
            <p style={{ color: 'var(--ink-soft)', fontSize: 15, lineHeight: 1.75 }}>
              Fastigheten uppfördes 1935 och är välunderhållen. Föreningen värnar om ett trivsamt boende och en långsiktigt stabil ekonomi.
            </p>
          </div>
        </FadeIn>
        <div>
          <div style={{ borderLeft: '2px solid var(--accent-mid)', paddingLeft: 22, marginBottom: 36 }}>
            <FadeIn><p style={{ color: 'var(--ink-muted)', fontSize: 11, letterSpacing: '.1em', textTransform: 'uppercase', marginBottom: 16, fontWeight: 500 }}>Faktablad</p></FadeIn>
            {[
            ['Org.nr', '769601-5028'],
            ['Registrerad', '1996'],
            ['Byggår', '1935'],
            ['Lägenheter', '24 bostadsrätter + 1 lokal'],
            ['Trapphus / våningar', '1 trapphus, 5 våningar'],
            ['Uppvärmning', 'Bergvärme'],
            ['Avgift inkl.', 'Värme, vatten, bredband, kabel-TV'],
            ['Skuldsättning/kvm', '2 035 kr (2025)'],
            ['Adress', 'Erik Dahlbergsgatan 28, Stockholm']].
            map(([k, v], i) =>
            <FadeIn key={k} from='left' delay={i * 40}>
                <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: '1px solid var(--border)', fontSize: 14 }}>
                  <span style={{ color: 'var(--ink-muted)' }}>{k}</span>
                  <span style={{ color: 'var(--ink)', fontWeight: 400 }}>{v}</span>
                </div>
              </FadeIn>
            )}

        <p style={{ color: 'rgba(255,255,255,.4)', fontSize: 10, letterSpacing: '.22em', textTransform: 'uppercase', fontFamily: 'var(--sans)', marginBottom: 14 }}>Bildgalleri</p>

      </FadeIn>
      <div className="gallery-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gridTemplateRows: 'repeat(3, 260px)', gap: 10 }}>
        {photos.map((p, i) =>
        <FadeIn key={i} delay={i * 60} style={{ gridColumn: p.gc, gridRow: p.gr }}>
            <div onClick={() => setLightbox(i)} style={{ cursor: 'pointer', overflow: 'hidden', borderRadius: 4, position: 'relative', height: '100%' }}>
              <img src={p.src} alt={p.alt} loading="lazy" style={{ width: '100%', height: '100%', objectFit: 'cover', transition: 'transform .45s ease' }}
            onMouseEnter={(e) => e.currentTarget.style.transform = 'scale(1.04)'}
            onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'} />
              <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top,rgba(0,0,0,.5) 0%,transparent 50%)', opacity: 0, transition: 'opacity .3s' }}

            </div>
          </FadeIn>
        )}
      </div>
      {lightbox !== null &&
      <div onClick={() => setLightbox(null)}
        onTouchStart={(e) => setTouchStartX(e.touches[0].clientX)}

          if (touchStartX === null) return;
          const dx = touchStartX - e.changedTouches[0].clientX;

        style={{ position: 'fixed', left: 24, top: '50%', transform: 'translateY(-50%)', background: 'rgba(255,255,255,.12)', border: 'none', borderRadius: '50%', width: 48, height: 48, color: '#fff', fontSize: 22, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>‹</button>
          <button onClick={(e) => {e.stopPropagation();setLightbox((l) => (l + 1) % photos.length);}}

        </div>
      }
    </Sec>);

}

  const [filter, setFilter] = useState('Alla');

      .catch(() => setLoading(false));

  const shown = filter === 'Alla' ? docs : docs.filter((d) => d.cat === filter);
  return (
    <Sec id="dokument" label="Dokument">

      <div style={{ border: '1px solid var(--border)', borderRadius: 8, overflow: 'hidden' }}>

        <FadeIn key={doc.name} delay={i * 35}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '18px 24px',

                <div style={{ width: 34, height: 42, background: 'var(--accent-light)', borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <svg width="15" height="19" viewBox="0 0 16 20" fill="none">
                    <path d="M9 1H3a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V7L9 1z" stroke="var(--accent)" strokeWidth="1.5" strokeLinejoin="round" />
                    <path d="M9 1v6h6" stroke="var(--accent)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>

                  <p style={{ fontFamily: 'var(--sans)', fontSize: 14, fontWeight: 400, color: 'var(--ink)', marginBottom: 2 }}>{doc.name}</p>

            style={{ display: 'inline-flex', alignItems: 'center', gap: 6, color: 'var(--accent)', fontSize: 11, fontWeight: 500, letterSpacing: '.08em', textTransform: 'uppercase', textDecoration: 'none', flexShrink: 0 }}>

            Öppna i Google Maps
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6h8M7 3l3 3-3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </a>
        </FadeIn>
        <MapEmbed />
      </div>
    </section>);
}

// ── Footer ─────────────────────────────────────────────────────────────────
function Footer() {
  return (
    <footer style={{ background: 'var(--ink)', color: 'rgba(255,255,255,.45)', padding: '52px clamp(20px,4vw,48px)', fontFamily: 'var(--sans)', fontSize: 13 }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 32 }}>
        <div>
          <p style={{ fontFamily: 'var(--serif)', fontSize: 22, color: '#fff', fontWeight: 300, marginBottom: 6 }}>BRF Reveljen 4</p>
          <p>Erik Dahlbergsgatan 28, Stockholm</p>
          <p style={{ marginTop: 4 }}>Org.nr 769601-5028</p>
        </div>
        <div style={{ display: 'flex', gap: 32, flexWrap: 'wrap' }}>
          {[['om', 'Om föreningen'], ['boende', 'Boendeinformation'], ['galleri', 'Fastigheten'], ['dokument', 'Dokument'], ['kontakt', 'Kontakt']].map(([id, l]) =>
          <a key={id} href={`#${id}`} style={{ color: 'rgba(255,255,255,.45)', textDecoration: 'none', transition: 'color .2s', letterSpacing: '.04em' }}
          onMouseEnter={(e) => e.target.style.color = '#fff'} onMouseLeave={(e) => e.target.style.color = 'rgba(255,255,255,.45)'}>{l}</a>
          )}
        </div>
        <p style={{ width: '100%', borderTop: '1px solid rgba(255,255,255,.08)', paddingTop: 24, marginTop: 4, textAlign: 'center', fontSize: 11, letterSpacing: '.04em' }}>
          © {new Date().getFullYear()} BRF Reveljen 4 · Webbplatsen drivs av styrelsen
        </p>
      </div>
    </footer>);

}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState('hero');
  useEffect(() => {
    const ids = ['hero', 'om', 'boende', 'galleri', 'dokument', 'kontakt'];
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {if (e.isIntersecting) setActive(e.target.id);});
    }, { threshold: 0.25 });
    ids.forEach((id) => {const el = document.getElementById(id);if (el) obs.observe(el);});
    return () => obs.disconnect();
  }, []);
  return (
    <>
      <Nav active={active} />
      <main>
        <Hero /><Stats /><Om /><Boende /><Galleri /><Dokument /><Kontakt /><Karta />
      </main>
      <Footer />
    </>);

}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
